# ============================================================
# Server
# ============================================================
# When run standalone (embedded Tomcat via `mvn spring-boot:run`), this is the port.
# When deployed as a WAR into an external Tomcat, Tomcat's own port/context path apply instead
# and this value is ignored.
server.port=${PORT:8080}

# ============================================================
# Database (PostgreSQL)
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/qitracker}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:@mp@th21}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema. Hibernate must not try to auto-create/alter tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================
# Mail (used for password reset + scheduled PDF report emails)
# Fill these in with your SMTP provider, or an internal relay.
# ============================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:qi-tracker@example.org}

# ============================================================
# App-specific settings
# ============================================================
# Anyone with this code can self-register. Change it, or rotate it, before handing out.
app.signup-code=${SIGNUP_CODE:qi-team-2026}

# Base URL used to build links inside emails (password reset, report notifications).
# Set this to wherever your team actually reaches the app, e.g. http://192.168.1.42:8080
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Cron for the scheduled report job: default runs once a day at 07:00 server time,
# and decides per-project whether a report is actually due based on reporting_frequency.
app.report-scheduler.cron=${REPORT_CRON:0 0 7 * * *}

logging.level.com.qitracker=DEBUG
