<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — QI Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F7F6; --surface:#FFFFFF; --ink:#16262B; --ink-soft:#5B6E73; --ink-faint:#93A3A6;
    --border:#DCE4E2; --teal:#2C6E63; --teal-dark:#1F4F47; --teal-tint:#E4EFEC; --brick:#B14A3E; --brick-tint:#F5E4E1;
    --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:380px;
    box-shadow:0 4px 24px rgba(22,38,43,0.06);}
  h1{font-family:var(--font-display);font-size:18px;margin:0 0 6px;}
  p.sub{font-size:13px;color:var(--ink-soft);margin:0 0 20px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  .field input{width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--ink);font-size:14px;}
  .field input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint);}
  .btn{width:100%;padding:11px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-weight:600;font-size:14px;cursor:pointer;margin-top:6px;}
  .btn:hover{background:var(--teal-dark);}
  .btn:disabled{opacity:0.6;}
  .error{background:var(--brick-tint);color:var(--brick);border-radius:7px;padding:9px 11px;font-size:12.5px;margin-bottom:14px;display:none;}
  .error.show{display:block;}
  .success{background:var(--teal-tint);color:var(--teal-dark);border-radius:7px;padding:9px 11px;font-size:12.5px;margin-bottom:14px;display:none;}
  .success.show{display:block;}
  a{color:var(--teal-dark);}
</style>
</head>
<body>
  <div class="card">
    <h1>Set a new password</h1>
    <p class="sub" id="subText">Choose a new password for your account.</p>
    <div class="error" id="errorBox"></div>
    <div class="success" id="successBox"></div>
    <form id="resetForm" onsubmit="return doReset(event)">
      <div class="field"><label>New password</label><input type="password" id="rp-password" minlength="8" required></div>
      <div class="field"><label>Confirm new password</label><input type="password" id="rp-confirm" minlength="8" required></div>
      <button class="btn" type="submit" id="resetBtn">Set new password</button>
    </form>
  </div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
if(!token){
  document.getElementById('subText').textContent = 'This link is missing its reset token.';
  document.getElementById('resetForm').style.display = 'none';
}

function showError(msg){ const b=document.getElementById('errorBox'); b.textContent=msg; b.classList.add('show'); }

async function doReset(e){
  e.preventDefault();
  document.getElementById('errorBox').classList.remove('show');
  const pw = document.getElementById('rp-password').value;
  const confirm = document.getElementById('rp-confirm').value;
  if(pw !== confirm){ showError("Those passwords don't match."); return false; }
  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try{
    const res = await fetch('/api/auth/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token, newPassword: pw })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Could not reset your password.');
    document.getElementById('resetForm').style.display = 'none';
    const s = document.getElementById('successBox');
    s.innerHTML = 'Password updated. <a href="/login.html">Sign in</a>';
    s.classList.add('show');
  }catch(err){
    showError(err.message);
    btn.disabled = false; btn.textContent = 'Set new password';
  }
  return false;
}
</script>
</body>
</html>
